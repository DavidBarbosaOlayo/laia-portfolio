backend:
  name: git-gateway
  branch: main

local_backend:
  url: http://127.0.0.1:8081/api/v1

media_folder: "public/uploads"
public_folder: "/uploads"

# NOTA: el widget de biblioteca de Cloudinary se probo (media_library: cloudinary)
# pero la editora no lograba ver ni subir por permisos/sesion de su cuenta. Se
# usa la biblioteca por defecto de Decap (ve y selecciona lo ya subido). Para
# videos pesados, que fallan al subirse al repo por git-gateway, se sube a
# Cloudinary aparte y se pega la URL en el campo (choose_url: true).

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "profile"
    label: "Perfil"
    files:
      - label: "Perfil publico"
        name: "main"
        file: "src/content/profile/main.md"
        fields:
          - label: "Nombre"
            name: "name"
            widget: "string"
          - label: "Rol"
            name: "role"
            widget: "string"
          - label: "Ubicacion"
            name: "location"
            widget: "string"
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "LinkedIn"
            name: "linkedinUrl"
            widget: "string"
            required: false
          - label: "Frase principal"
            name: "tagline"
            widget: "string"
          - label: "Bio corta"
            name: "shortBio"
            widget: "text"
          - label: "Disponibilidad"
            name: "availability"
            widget: "string"
          - label: "Navegacion - trabajos"
            name: "navWorkLabel"
            widget: "string"
          - label: "Navegacion - perfil"
            name: "navProfileLabel"
            widget: "string"
          - label: "Navegacion - contacto"
            name: "navContactLabel"
            widget: "string"
          - label: "Cabecera - estado"
            name: "headerStatusLabel"
            widget: "string"
          - label: "Hero - linea superior"
            name: "heroEyebrow"
            widget: "string"
          - label: "Hero - estadisticas"
            name: "heroStats"
            widget: "list"
            fields:
              - label: "Valor"
                name: "value"
                widget: "string"
              - label: "Etiqueta"
                name: "label"
                widget: "string"
          - label: "Hero - boton principal"
            name: "primaryCtaLabel"
            widget: "string"
          - label: "Hero - boton secundario"
            name: "secondaryCtaLabel"
            widget: "string"
          - label: "PORTADA - de donde sale el video grande"
            name: "heroMediaMode"
            widget: "select"
            default: "project"
            hint: "Decide que se ve en el monitor vertical de la portada, al lado del nombre. Segun lo que elijas aqui se usa el campo 'proyecto' o el campo 'video propio' de abajo; el otro se ignora."
            options:
              - label: "Un proyecto del portfolio"
                value: "project"
              - label: "Un video propio solo para la portada"
                value: "custom"
          - label: "PORTADA - proyecto"
            name: "heroProject"
            widget: "relation"
            collection: "projects"
            required: false
            search_fields: ["title", "client"]
            value_field: "{{slug}}"
            display_fields: ["title", "client"]
            hint: "Solo se usa en el modo 'Un proyecto del portfolio'. Se muestra el video de ese proyecto y el monitor enlaza a su pagina. Si lo dejas vacio se usa el primer proyecto por orden."
          - label: "PORTADA - video propio"
            name: "heroVideoUrl"
            widget: "file"
            required: false
            choose_url: true
            hint: "Solo se usa en el modo 'Un video propio'. Elige un video ya subido o pega una URL con 'Insert from URL'. IMPORTANTE: aqui los enlaces de YouTube y Vimeo NO se reproducen, tiene que ser un video de Cloudinary o una URL directa .mp4 .webm .mov o .m4v."
          - label: "PORTADA - imagen de respaldo"
            name: "heroPoster"
            widget: "image"
            required: false
            choose_url: true
            hint: "Opcional, solo para el modo 'Un video propio': se muestra si no hay video valido."
          - label: "PORTADA - titulo del rotulo"
            name: "heroCustomTitle"
            widget: "string"
            required: false
            hint: "Opcional, solo para el modo 'Un video propio': texto en negrita abajo del monitor. Vacio = sin rotulo."
          - label: "PORTADA - subtitulo del rotulo"
            name: "heroCustomSubtitle"
            widget: "string"
            required: false
            hint: "Opcional, solo para el modo 'Un video propio': segunda linea del rotulo."
          - label: "PORTADA - enlace al pulsar"
            name: "heroCustomLink"
            widget: "string"
            required: false
            hint: "Opcional, solo para el modo 'Un video propio': a donde lleva al hacer clic. Vacio = el monitor no es clicable."
          - label: "Monitor - estado con video"
            name: "monitorStatusVideo"
            widget: "string"
          - label: "Monitor - estado con imagen"
            name: "monitorStatusImage"
            widget: "string"
          - label: "Monitor - texto sin medio"
            name: "monitorFallback"
            widget: "string"
          - label: "Monitor - texto inferior izquierdo"
            name: "monitorBottomLeft"
            widget: "string"
          - label: "Monitor - FPS visible"
            name: "monitorFpsLabel"
            widget: "string"
          - label: "Monitor - frame rate del contador"
            name: "monitorFrameRate"
            widget: "number"
            value_type: "int"
          - label: "Carrusel inferior portada"
            name: "marqueeItems"
            widget: "list"
            field:
              label: "Texto"
              name: "item"
              widget: "string"
          - label: "Trabajos - etiqueta"
            name: "workEyebrow"
            widget: "string"
          - label: "Trabajos - titulo"
            name: "workTitle"
            widget: "string"
          - label: "Trabajos - etiqueta bloque"
            name: "workBlockLabel"
            widget: "string"
          - label: "Trabajos - etiqueta verticales"
            name: "workVerticalLabel"
            widget: "string"
          - label: "Trabajos - etiqueta horizontal"
            name: "workHorizontalLabel"
            widget: "string"
          - label: "Perfil - etiqueta"
            name: "aboutEyebrow"
            widget: "string"
          - label: "Perfil - texto principal"
            name: "aboutBio"
            widget: "text"
            hint: "Permite HTML simple como <em>texto</em>."
          - label: "Perfil - tarjetas"
            name: "aboutCards"
            widget: "list"
            fields:
              - label: "Numero"
                name: "number"
                widget: "string"
              - label: "Titulo"
                name: "title"
                widget: "string"
              - label: "Texto"
                name: "text"
                widget: "text"
          - label: "Trayectoria - etiqueta"
            name: "timelineEyebrow"
            widget: "string"
          - label: "Trayectoria - titulo"
            name: "timelineTitle"
            widget: "string"
          - label: "Trayectoria - items"
            name: "timelineItems"
            widget: "list"
            fields:
              - label: "Fecha"
                name: "date"
                widget: "string"
              - label: "Titulo"
                name: "title"
                widget: "string"
              - label: "Texto"
                name: "text"
                widget: "text"
          - label: "Contacto - etiqueta"
            name: "contactEyebrow"
            widget: "string"
          - label: "Contacto - texto LinkedIn"
            name: "linkedinLabel"
            widget: "string"
          - label: "Contacto - texto email"
            name: "emailCtaLabel"
            widget: "string"
          - label: "Footer - texto final"
            name: "footerNote"
            widget: "string"
          - label: "Proyecto - volver"
            name: "projectBackLabel"
            widget: "string"
          - label: "Proyecto - etiqueta cliente"
            name: "projectClientLabel"
            widget: "string"
          - label: "Proyecto - etiqueta rol"
            name: "projectRoleLabel"
            widget: "string"
          - label: "Proyecto - etiqueta formato"
            name: "projectFormatLabel"
            widget: "string"
          - label: "Proyecto - sin medio"
            name: "projectNoMediaLabel"
            widget: "string"
          - label: "Proyecto - galeria etiqueta"
            name: "projectGalleryEyebrow"
            widget: "string"
          - label: "Proyecto - galeria titulo"
            name: "projectGalleryTitle"
            widget: "string"
          - label: "Proyecto - servicios"
            name: "projectServicesLabel"
            widget: "string"
          - label: "Proyecto - creditos"
            name: "projectCreditsLabel"
            widget: "string"
          - label: "Puntos clave"
            name: "highlights"
            widget: "list"
            field:
              label: "Punto"
              name: "highlight"
              widget: "string"
          - label: "Herramientas"
            name: "tools"
            widget: "list"
            field:
              label: "Herramienta"
              name: "tool"
              widget: "string"
          - label: "Texto largo"
            name: "body"
            widget: "markdown"

  - name: "workSections"
    label: "Modulos de trabajo"
    label_singular: "Modulo de trabajo"
    folder: "src/content/workSections"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: "title"
    editor:
      preview: false
    fields:
      - label: "Publicado"
        name: "published"
        widget: "boolean"
        default: true
      - label: "ID interno"
        name: "id"
        widget: "string"
        hint: "Identificador estable sin acentos ni espacios. Ejemplo: codigo-nuevo, crisalide."
      - label: "Nombre visible"
        name: "title"
        widget: "string"
      - label: "Orden"
        name: "order"
        widget: "number"
        default: 10
        value_type: "int"
      - label: "Descripcion"
        name: "summary"
        widget: "text"
        required: false
      - label: "Notas internas"
        name: "body"
        widget: "markdown"
        required: false

  - name: "projects"
    label: "Proyectos"
    label_singular: "Proyecto"
    folder: "src/content/projects"
    create: true
    delete: true
    slug: "{{year}}-{{slug}}"
    editor:
      preview: true
    fields:
      - label: "Publicado"
        name: "published"
        widget: "boolean"
        default: true
      - label: "Destacado"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Solo pinta la etiqueta 'Destacado' sobre la miniatura en la lista de trabajos. NO decide el video de la portada: eso se elige en Perfil > PORTADA."
      - label: "Orden"
        name: "order"
        widget: "number"
        default: 10
        value_type: "int"
      - label: "Ubicacion en trabajos"
        name: "workPlacement"
        widget: "select"
        default: "vertical"
        hint: "Carrusel vertical para reels 9:16. Video horizontal para la pieza 16:9 que aparece debajo."
        options:
          - label: "Carrusel vertical / reels"
            value: "vertical"
          - label: "Video horizontal"
            value: "horizontal"
      - label: "Bloque de trabajo"
        name: "workSection"
        widget: "relation"
        collection: "workSections"
        search_fields: ["title", "id"]
        value_field: "id"
        display_fields: ["title"]
        default: "codigo-nuevo"
        hint: "Elige el modulo donde se mostrara este proyecto. Los modulos se crean en 'Modulos de trabajo'."
      - label: "Titulo"
        name: "title"
        widget: "string"
      - label: "Cliente"
        name: "client"
        widget: "string"
      - label: "Ano"
        name: "year"
        widget: "number"
        value_type: "int"
      - label: "Rol"
        name: "role"
        widget: "string"
      - label: "Categoria"
        name: "category"
        widget: "select"
        options:
          - "RRSS"
          - "Serie digital"
          - "Entrevistas"
          - "Marca"
          - "Podcast"
          - "Videoclip"
          - "Evento"
          - "VFX"
          - "Otros"
      - label: "Formato"
        name: "format"
        widget: "string"
        hint: "Ejemplo: Reels / TikToks / YouTube / videoblog / contenido de marca."
      - label: "Resumen corto"
        name: "summary"
        widget: "text"
      - label: "Thumbnail opcional"
        name: "thumbnail"
        widget: "image"
        required: false
        choose_url: true
        hint: "Elige una imagen ya subida o sube una nueva. Tambien puedes pegar una URL externa."
      - label: "Video"
        name: "videoUrl"
        widget: "file"
        required: false
        choose_url: true
        hint: "Elige un video ya subido, o pega una URL de Cloudinary, Vimeo o YouTube con 'Insert from URL'. OJO: los videos pesados NO se pueden subir aqui (fallan al guardar); subelos a Cloudinary aparte y pega la URL."
      - label: "Videos adicionales"
        name: "videoGallery"
        widget: "list"
        required: false
        summary: "{{fields.title}}"
        fields:
          - label: "Titulo"
            name: "title"
            widget: "string"
            required: false
          - label: "Video"
            name: "videoUrl"
            widget: "file"
            choose_url: true
            hint: "Elige un video ya subido o pega una URL de Cloudinary con 'Insert from URL'. Los videos pesados no se suben aqui: subelos a Cloudinary aparte."
      - label: "Servicios"
        name: "services"
        widget: "list"
        required: false
        field:
          label: "Servicio"
          name: "service"
          widget: "string"
      - label: "Creditos"
        name: "credits"
        widget: "list"
        required: false
        field:
          label: "Credito"
          name: "credit"
          widget: "string"
      - label: "Descripcion"
        name: "body"
        widget: "markdown"
